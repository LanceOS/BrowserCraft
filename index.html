<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voxel Sandbox Engine</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(76, 133, 171, 0.55), transparent 48%),
          linear-gradient(180deg, #0f1d2a 0%, #0a1118 100%);
      }

      body {
        display: grid;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
